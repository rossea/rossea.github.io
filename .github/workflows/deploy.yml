name: Deploy Pages

# 触发条件，push到main分支或者pull request到main分支
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  # 支持手动在工作流上触发
  workflow_dispatch:

# 设置时区
env:
  TZ: Asia/Shanghai

# 权限设置
permissions:
  # 允许读取仓库内容的权限。
  contents: read
  # 允许写入 GitHub Pages 的权限。
  pages: write
  # 允许写入 id-token 的权限。
  id-token: write

# 并发控制配置
concurrency:
  group: pages
  cancel-in-progress: false

# 定义执行任务
jobs:

  # Cleanup job
  cleanup:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Delete deployment
        uses: strumwolf/delete-deployment-environment@v2.3.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: github-pages
          onlyRemoveDeployments: true

  # 构建任务
  build:

    runs-on: ubuntu-latest

    # node v24 运行
    strategy:
      matrix:
        node-version: [24]

    steps:
      # 拉取代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 保留 Git 信息
          fetch-depth: 0

      # 设置使用 Node.js 版本
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # 使用 最新的 PNPM
      - uses: pnpm/action-setup@v2
        name: Install pnpm
        with:
          version: latest
          run_install: false

      - name: Install packages
        run: pnpm install && mkdir -p bin && curl -L https://github.com/microsoft/docfind/releases/download/v0.5.1/docfind-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C bin && chmod +x bin/docfind && export PATH=$PWD/bin:$PATH && docfind --version

      #    安装自定义软件包依赖
      - name: add packages markdown-it-plugins
        run: pnpm add ./install_pkg/stone-zeng-markdown-it-plugins-0.1.0.tgz -w

      - name: add packages vitepress-plugin-docfind
        run: pnpm add ./install_pkg/stone-zeng-vitepress-plugin-docfind-0.1.0.tgz -w

      - name: add packages vitepress-plugin-feed
        run: pnpm add ./install_pkg/stone-zeng-vitepress-plugin-feed-0.1.0.tgz -w

        # 构建项目
        # 注意：在 Github Actions 中，以前步骤导入 $PATH, 在本步骤中不会生效。所以，必须在每个 step 导入所需 $PATH。
      - name: Build blog project
        run: |
          echo ${{ github.workspace }}
          export PATH=$PWD/bin:$PATH && pnpm packages:test && pnpm packages:build && pnpm build

        # 资源拷贝
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./.vitepress/dist
          destination: ./_site

        # 上传 _site 的资源，用于后续部署
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3


  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4